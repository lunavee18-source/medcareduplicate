<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0f2e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MedCare"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="description" content="MedCare — Your Complete Health Companion, Tumkur"/>
<link rel="manifest" href="/static/manifest.json"/>
<link rel="apple-touch-icon" href="/static/icon-192.png"/>
<title>MedCare — Your Health Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060b1f;--bg2:#0c1230;--bg3:#111830;--card:#141a35;--card2:#1b2242;
  --accent:#4f8ef7;--accent2:#7c5ffc;--green:#00e5a0;--red:#ff4d6d;
  --amber:#ffb830;--cyan:#00d4ff;--pink:#ff6eb4;
  --text:#e8eeff;--text2:#8892b0;--text3:#4a5568;
  --border:rgba(79,142,247,0.18);--border2:rgba(255,255,255,0.07);
  --glow:rgba(79,142,247,0.25);--shadow:0 20px 60px rgba(0,0,0,0.5);
  --r:14px;--r2:20px;--r3:28px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,select,textarea{font-family:inherit;outline:none}

.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.glow-orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.12;animation:orbFloat 12s ease-in-out infinite}
.glow-orb:nth-child(1){width:700px;height:700px;background:radial-gradient(circle,#4f8ef7,transparent);top:-20%;left:-10%}
.glow-orb:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,#7c5ffc,transparent);bottom:-10%;right:-5%;animation-delay:-4s}
.glow-orb:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,#00d4ff,transparent);top:40%;left:30%;animation-delay:-8s;opacity:0.08}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-60px)}66%{transform:translate(-30px,40px)}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(79,142,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.04) 1px,transparent 1px);background-size:50px 50px}
#app{position:relative;z-index:1;min-height:100vh}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.auth-card{background:rgba(20,26,53,0.95);border:1px solid var(--border);border-radius:var(--r3);padding:2.5rem;width:100%;max-width:500px;backdrop-filter:blur(30px);box-shadow:var(--shadow);animation:cardIn .5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes cardIn{from{opacity:0;transform:scale(0.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.auth-logo{text-align:center;margin-bottom:2rem}
.logo-icon-wrap{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 0 40px var(--glow);animation:logoPulse 3s ease-in-out infinite;font-size:2.5rem}
@keyframes logoPulse{0%,100%{box-shadow:0 0 30px var(--glow)}50%{box-shadow:0 0 60px var(--glow),0 0 100px rgba(79,142,247,0.2)}}
.auth-logo h1{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px}
.auth-logo p{color:var(--text2);font-size:.875rem;margin-top:.3rem}
.role-tabs{display:flex;gap:8px;margin-bottom:1.5rem;background:var(--bg2);border-radius:12px;padding:5px}
.role-tab{flex:1;padding:.6rem;text-align:center;border-radius:9px;font-size:.85rem;font-weight:600;color:var(--text2);transition:all .25s;background:none;border:none}
.role-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 15px var(--glow)}
.form-section{margin-bottom:1.25rem}
.section-head{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.section-head::after{content:'';flex:1;height:1px;background:var(--border2)}
.form-row{display:grid;gap:.75rem;margin-bottom:.75rem}
.form-row.cols2{grid-template-columns:1fr 1fr}
.form-row.cols3{grid-template-columns:1fr 1fr 1fr}
.fg{display:flex;flex-direction:column;gap:.3rem}
.fg label{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text2)}
.fg input,.fg select,.fg textarea{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.7rem .9rem;color:var(--text);font-size:.9rem;transition:all .2s;width:100%}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,0.12)}
.fg input::placeholder{color:var(--text3)}
.fg select option{background:var(--bg3)}
.fg textarea{resize:vertical;min-height:70px}
.doctor-entry{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.75rem;margin-bottom:.6rem;position:relative}
.rem-doc{position:absolute;top:.5rem;right:.5rem;background:rgba(255,77,109,0.15);border:1px solid rgba(255,77,109,0.3);border-radius:6px;color:var(--red);font-size:.75rem;padding:.2rem .5rem;cursor:pointer}
.add-doctor-btn{width:100%;padding:.6rem;background:rgba(79,142,247,0.08);border:1px dashed var(--border);border-radius:10px;color:var(--accent);font-size:.85rem;font-weight:600;transition:all .2s;margin-top:.5rem}
.add-doctor-btn:hover{background:rgba(79,142,247,0.15)}
.err-msg{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);border-radius:8px;padding:.6rem .9rem;font-size:.82rem;color:var(--red);margin-bottom:.75rem;display:none}
.err-msg.show{display:block}
.submit-btn{width:100%;padding:1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.04em;transition:all .25s;margin-top:.75rem}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--glow)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alt-link{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--text2)}
.alt-link span{color:var(--accent);cursor:pointer;font-weight:600}

/* ── APP SHELL ── */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:250px;background:rgba(12,18,48,0.98);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem .875rem;position:fixed;height:100vh;overflow-y:auto;z-index:200;transition:transform .3s cubic-bezier(0.34,1.56,0.64,1)}
.sb-logo{display:flex;align-items:center;gap:.75rem;padding:.5rem .5rem;margin-bottom:1.75rem}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 20px var(--glow)}
.sb-logo h2{font-family:'Orbitron',sans-serif;font-size:.95rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:.3rem .6rem;margin-bottom:.2rem}
.nav-btn{display:flex;align-items:center;gap:.7rem;width:100%;padding:.6rem .75rem;border-radius:10px;background:none;border:none;color:var(--text2);font-size:.875rem;font-weight:500;transition:all .2s;text-align:left;margin-bottom:.15rem}
.nav-btn .ni{font-size:1.1rem;flex-shrink:0}
.nav-btn:hover{color:var(--text);background:rgba(79,142,247,0.08)}
.nav-btn.active{color:#fff;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 15px var(--glow)}
.sb-footer{margin-top:auto;border-top:1px solid var(--border2);padding-top:1rem}
.user-chip{display:flex;align-items:center;gap:.75rem;padding:.7rem;background:var(--bg3);border-radius:12px;border:1px solid var(--border2)}
.uc-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
.uc-info{flex:1;min-width:0}
.uc-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-role{font-size:.68rem;color:var(--text3)}
.logout-btn{background:none;border:none;color:var(--text3);font-size:1.1rem;transition:color .2s;padding:.25rem}
.logout-btn:hover{color:var(--red)}
.mob-header{display:none;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;background:rgba(12,18,48,0.98);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:150;backdrop-filter:blur(20px)}
.mob-logo-wrap{display:flex;align-items:center;gap:.6rem}
.mob-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.mob-logo{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.menu-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem;color:var(--text2);font-size:1.1rem}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:199}
.sidebar-overlay.show{display:block}
.main-content{margin-left:250px;flex:1;padding:1.75rem;min-height:100vh}
.content-inner{max-width:1080px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-head{margin-bottom:1.75rem}
.page-head h1{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,var(--text),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem}
.page-head p{color:var(--text2);font-size:.85rem}

/* ── CARDS ── */
.card{background:rgba(20,26,53,0.9);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;backdrop-filter:blur(10px);transition:all .3s}
.card:hover{border-color:rgba(79,142,247,0.3)}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.stats-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:rgba(20,26,53,0.9);border-radius:var(--r);padding:1.25rem;position:relative;overflow:hidden;border:1px solid var(--border);transition:all .3s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.3)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--cyan))}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),#00ff88)}
.stat-card.red::before{background:linear-gradient(90deg,var(--red),var(--pink))}
.stat-card.amber::before{background:linear-gradient(90deg,var(--amber),#ffdd00)}
.stat-card.purple::before{background:linear-gradient(90deg,var(--accent2),var(--pink))}
.stat-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:.7rem}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;line-height:1;margin-bottom:.2rem}
.stat-lbl{font-size:.78rem;color:var(--text2)}
.stat-sub{font-size:.72rem;color:var(--text3);margin-top:.25rem}
.progress-wrap{margin-top:.65rem}
.progress-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:5px;transition:width 1s ease}
.progress-fill.blue{background:linear-gradient(90deg,var(--accent),var(--cyan))}
.progress-fill.green{background:linear-gradient(90deg,var(--green),#00ff88)}
.progress-fill.amber{background:linear-gradient(90deg,var(--amber),#ffdd00)}
.progress-fill.red{background:linear-gradient(90deg,var(--red),var(--pink))}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.25rem}

/* ── CALORIE RING ── */
.cal-ring-section{display:flex;gap:1.75rem;align-items:center;flex-wrap:wrap}
.cal-ring-info{flex:1;min-width:180px}
.macro-row{margin-bottom:.8rem}
.macro-label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2);margin-bottom:.3rem}
.macro-label span{color:var(--text);font-weight:600}

/* ── EXERCISE ── */
.ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.ex-card{background:rgba(20,26,53,0.9);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem;cursor:pointer;transition:all .3s;position:relative}
.ex-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px var(--glow)}
.ex-card.done{border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.05)}
.ex-card.done::after{content:'✓';position:absolute;top:.75rem;right:.75rem;width:24px;height:24px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#000;font-weight:700;text-align:center;line-height:24px}
.ex-icon{font-size:1.8rem;margin-bottom:.5rem;display:block}
.ex-name{font-weight:700;font-size:.875rem;margin-bottom:.15rem}
.ex-dur{font-size:.72rem;color:var(--text2)}
.ex-cal{font-size:.75rem;color:var(--amber);margin-top:.35rem}
.ex-badge{display:inline-block;margin-top:.5rem;padding:.12rem .45rem;border-radius:5px;font-size:.68rem;font-weight:600}
.ex-badge.done{background:rgba(0,229,160,0.15);color:var(--green)}
.ex-badge.todo{background:rgba(79,142,247,0.12);color:var(--accent)}

/* ── HOSPITALS ── */
.hospitals-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.hosp-card{background:rgba(20,26,53,0.9);border:1px solid var(--border);border-radius:var(--r2);padding:1.4rem;cursor:pointer;transition:all .3s;animation:fadeIn .3s ease both}
.hosp-card:hover{border-color:var(--accent);transform:translateY(-4px);box-shadow:0 15px 50px var(--glow)}
.hosp-head{display:flex;gap:.875rem;margin-bottom:.875rem;align-items:flex-start}
.hosp-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;box-shadow:0 4px 20px var(--glow)}
.hosp-name{font-size:1rem;font-weight:700;margin-bottom:.25rem;line-height:1.3}
.hosp-addr{font-size:.75rem;color:var(--text2);line-height:1.4}
.hosp-meta{display:flex;gap:1rem;flex-wrap:wrap;margin:.65rem 0;padding:.65rem 0;border-top:1px solid var(--border2);border-bottom:1px solid var(--border2)}
.hosp-meta-item{text-align:center;flex:1}
.hosp-meta-val{font-size:1rem;font-weight:700}
.hosp-meta-lbl{font-size:.62rem;color:var(--text3);margin-top:.1rem}
.hosp-services{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.65rem}
.svc-tag{padding:.18rem .5rem;background:rgba(79,142,247,0.08);border:1px solid var(--border);border-radius:5px;font-size:.67rem;color:var(--accent)}
.hosp-desc{font-size:.75rem;color:var(--text2);line-height:1.55;margin-top:.6rem}
.hosp-cta{margin-top:.875rem;display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--accent);font-weight:700}

/* Hospital Detail */
.hosp-detail-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.back-btn{display:flex;align-items:center;gap:.4rem;background:rgba(79,142,247,0.08);border:1px solid var(--border);border-radius:10px;padding:.45rem .9rem;color:var(--accent);font-size:.82rem;font-weight:600;transition:all .2s}
.back-btn:hover{background:rgba(79,142,247,0.15)}
.doctors-list{display:flex;flex-direction:column;gap:.875rem}
.doc-card{background:rgba(27,34,66,0.9);border:1px solid var(--border2);border-radius:var(--r);padding:1rem;display:flex;gap:.875rem;align-items:flex-start;transition:all .2s}
.doc-card:hover{border-color:var(--accent);background:rgba(20,26,53,0.95)}
.doc-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--pink));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;color:#fff;flex-shrink:0}
.doc-info{flex:1}
.doc-name{font-weight:700;font-size:.92rem;margin-bottom:.12rem}
.doc-spec{font-size:.75rem;color:var(--accent);margin-bottom:.2rem}
.doc-meta{font-size:.72rem;color:var(--text2)}
.slots-wrap{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.slot{padding:.22rem .55rem;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:6px;font-size:.7rem;color:var(--cyan);cursor:pointer;transition:all .15s;font-weight:500}
.slot:hover,.slot.sel{background:rgba(0,212,255,0.25);border-color:var(--cyan);transform:scale(1.05)}

/* ── CHAT ── */
.chat-page{display:flex;flex-direction:column;height:calc(100vh - 100px);max-height:780px}
.chat-top{display:flex;align-items:center;gap:.875rem;padding:1.1rem 1.25rem;background:rgba(20,26,53,0.95);border:1px solid var(--border);border-radius:var(--r2) var(--r2) 0 0;border-bottom:none}
.bot-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.3rem;animation:botFloat 4s ease-in-out infinite;flex-shrink:0}
@keyframes botFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bot-name{font-weight:700;font-size:.95rem}
.bot-status{font-size:.72rem;color:var(--green);display:flex;align-items:center;gap:.35rem}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:statusPulse 1.5s infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-msgs{flex:1;overflow-y:auto;padding:1.1rem;background:rgba(6,11,31,0.85);display:flex;flex-direction:column;gap:.8rem}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{max-width:82%;animation:msgSlide .25s ease}
@keyframes msgSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.bot{align-self:flex-start;display:flex;gap:.5rem}
.msg-bot-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;margin-top:.2rem}
.msg-bubble{padding:.7rem .95rem;border-radius:16px;font-size:.85rem;line-height:1.65}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px}
.msg.bot .msg-bubble{background:rgba(27,34,66,0.95);border:1px solid var(--border2);color:var(--text);border-bottom-left-radius:4px;white-space:pre-wrap}
.msg-time{font-size:.62rem;color:var(--text3);margin-top:.25rem}
.msg.user .msg-time{text-align:right}
.typing-bubble{background:rgba(27,34,66,0.95);border:1px solid var(--border2);border-radius:16px;border-bottom-left-radius:4px;padding:.7rem .95rem}
.typing-dots{display:flex;gap:5px}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:typDot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typDot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.quick-actions{padding:.5rem 1.1rem;background:rgba(20,26,53,0.9);border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;gap:.4rem;overflow-x:auto}
.quick-actions::-webkit-scrollbar{height:0}
.qa-btn{padding:.28rem .65rem;background:rgba(79,142,247,0.1);border:1px solid var(--border);border-radius:20px;color:var(--accent);font-size:.72rem;white-space:nowrap;flex-shrink:0;transition:all .2s}
.qa-btn:hover{background:rgba(79,142,247,0.2)}
.chat-bottom{padding:.875rem;background:rgba(20,26,53,0.95);border:1px solid var(--border);border-radius:0 0 var(--r2) var(--r2);border-top:none;display:flex;gap:.65rem;align-items:flex-end}
.chat-inp{flex:1;padding:.7rem .9rem;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;color:var(--text);font-size:.875rem;resize:none;max-height:110px;line-height:1.5;transition:border-color .2s}
.chat-inp:focus{border-color:var(--accent)}
.chat-inp::placeholder{color:var(--text3)}
.chat-send{padding:.7rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;color:#fff;font-size:1rem;transition:all .2s;min-width:44px;display:flex;align-items:center;justify-content:center}
.chat-send:hover{transform:scale(1.08);box-shadow:0 4px 20px var(--glow)}
.chat-send:disabled{opacity:.5;transform:none}

/* ── APPOINTMENTS ── */
.appt-card{background:rgba(20,26,53,0.9);border:1px solid var(--border);border-radius:var(--r);padding:1rem;transition:all .2s;margin-bottom:.875rem;animation:fadeIn .3s ease both}
.appt-card:hover{border-color:rgba(79,142,247,0.3)}
.appt-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.appt-doctor{font-weight:700;font-size:.92rem;margin-bottom:.12rem}
.appt-spec{font-size:.75rem;color:var(--accent)}
.appt-hosp{font-size:.72rem;color:var(--text2);margin-top:.1rem}
.appt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;font-size:.78rem;margin-bottom:.65rem}
.appt-field{color:var(--text2);margin-bottom:.12rem;font-size:.7rem}
.appt-val{color:var(--text);font-weight:600}
.appt-actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}

/* ── REMINDERS ── */
.reminder-list{display:flex;flex-direction:column;gap:.65rem}
.rem-card{display:flex;align-items:center;gap:.875rem;padding:.875rem 1.1rem;background:rgba(20,26,53,0.9);border:1px solid var(--border);border-radius:var(--r);transition:all .2s}
.rem-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;background:linear-gradient(135deg,rgba(79,142,247,0.2),rgba(124,95,252,0.2));border:1px solid var(--border)}
.rem-info{flex:1}
.rem-name{font-weight:600;font-size:.875rem}
.rem-time{font-size:.75rem;color:var(--text2);margin-top:.12rem}

/* ── BADGES & BUTTONS ── */
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .5rem;border-radius:6px;font-size:.7rem;font-weight:700}
.b-green{background:rgba(0,229,160,0.12);color:var(--green)}
.b-red{background:rgba(255,77,109,0.12);color:var(--red)}
.b-amber{background:rgba(255,184,48,0.12);color:var(--amber)}
.b-blue{background:rgba(79,142,247,0.12);color:var(--accent)}
.b-purple{background:rgba(124,95,252,0.12);color:var(--accent2)}
.btn{padding:.45rem .9rem;border-radius:9px;font-size:.8rem;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:.35rem;cursor:pointer}
.btn-sm{padding:.3rem .65rem;font-size:.74rem}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none}
.btn-accent:hover{box-shadow:0 4px 20px var(--glow);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);color:var(--red)}
.btn-danger:hover{background:rgba(255,77,109,0.2)}
.btn-success{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--green)}
.btn-success:hover{background:rgba(0,229,160,0.2)}
.sec-title{font-size:.9rem;font-weight:700;margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem;color:var(--text)}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── FOOD LOG ── */
.food-row{display:grid;grid-template-columns:1fr 80px 70px 70px 70px auto;gap:.5rem;align-items:flex-end;margin-bottom:.75rem}
.food-item{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;background:rgba(27,34,66,0.8);border-radius:10px;border:1px solid var(--border2);margin-bottom:.4rem}
.fi-name{flex:1;font-size:.85rem;font-weight:600}
.fi-macros{font-size:.7rem;color:var(--text3);display:flex;gap:.5rem}
.fi-cal{font-size:.8rem;color:var(--amber);font-weight:600}
.fi-del{background:none;border:none;color:var(--text3);font-size:.95rem;transition:color .2s;padding:.2rem;cursor:pointer}
.fi-del:hover{color:var(--red)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(8px)}
.modal-box{background:rgba(20,26,53,0.98);border:1px solid var(--border);border-radius:var(--r2);padding:1.75rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:cardIn .3s ease;box-shadow:var(--shadow)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.1rem;transition:color .2s;padding:.25rem;cursor:pointer}
.modal-close:hover{color:var(--red)}

/* ── NOTIFICATIONS ── */
.notif-container{position:fixed;top:1rem;right:1rem;z-index:1000;display:flex;flex-direction:column;gap:.4rem;max-width:340px}
.notif{background:rgba(20,26,53,0.98);border:1px solid var(--border);border-radius:12px;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.65rem;box-shadow:var(--shadow);animation:notifIn .3s ease;backdrop-filter:blur(20px)}
@keyframes notifIn{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
.notif.out{animation:notifOut .25s ease forwards}
@keyframes notifOut{to{opacity:0;transform:translateX(110%)}}
.notif.success{border-color:rgba(0,229,160,0.4)}
.notif.error{border-color:rgba(255,77,109,0.4)}
.notif.alarm{border-color:rgba(255,184,48,0.4)}
.notif-icon{font-size:1.2rem;flex-shrink:0}
.notif-text{font-size:.83rem;font-weight:500}

/* ── HOSPITAL PORTAL ── */
.hosp-portal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.appts-table{width:100%;border-collapse:collapse}
.appts-table th{text-align:left;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:.55rem .9rem;border-bottom:1px solid var(--border2)}
.appts-table td{padding:.8rem .9rem;border-bottom:1px solid var(--border2);font-size:.83rem;vertical-align:middle}
.appts-table tr:hover td{background:rgba(79,142,247,0.04)}

/* ── INSTALL BANNER ── */
.install-banner{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:rgba(20,26,53,0.98);border:1px solid var(--border);border-radius:16px;padding:.875rem 1.25rem;display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow);z-index:900;backdrop-filter:blur(20px);max-width:380px;width:calc(100% - 2rem);animation:notifIn .4s ease}
.install-banner-text strong{color:var(--text);display:block;margin-bottom:.15rem;font-size:.9rem}
.install-banner-text p{font-size:.8rem;color:var(--text2)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--text3)}
.spin{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:.65rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:3rem 1.5rem}
.empty-icon{font-size:3rem;margin-bottom:.875rem;display:block}
.empty-state h3{font-size:1rem;margin-bottom:.4rem}
.empty-state p{font-size:.83rem;color:var(--text2);margin-bottom:1.25rem}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-250px)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow)}
  .mob-header{display:flex}
  .main-content{margin-left:0;padding:.875rem}
  .stats-grid{grid-template-columns:1fr 1fr}
  .g2,.g3{grid-template-columns:1fr}
  .hospitals-grid{grid-template-columns:1fr}
  .ex-grid{grid-template-columns:1fr 1fr}
  .hosp-portal-stats{grid-template-columns:1fr 1fr}
  .food-row{grid-template-columns:1fr 1fr;row-gap:.5rem}
  .appt-grid{grid-template-columns:1fr 1fr}
  .chat-page{height:calc(100vh - 70px)}
}
@media(max-width:480px){
  .stats-grid,.hosp-portal-stats{grid-template-columns:1fr}
  .ex-grid{grid-template-columns:1fr}
  .auth-card{padding:1.5rem}
  .form-row.cols2,.form-row.cols3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="bg-glow"><div class="glow-orb"></div><div class="glow-orb"></div><div class="glow-orb"></div></div>
<div class="grid-overlay"></div>
<div class="notif-container" id="notif-container"></div>
<div id="app"></div>

<script>
// ═══════════════ STATE ═══════════════
let STATE = {user:null,hospital:null,page:'health',hospitalDetail:null,chatHistory:[],selectedSlot:{},reminderIntervals:{}};
let alarmInterval = null;
let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  setTimeout(showInstallBanner, 4000);
});
window.addEventListener('appinstalled', () => {
  el('install-banner')?.remove();
  showNotif('MedCare installed on your home screen! 📱','success');
});

async function api(path, method='GET', body=null){
  try{
    const opts={method,credentials:'include',headers:{'Content-Type':'application/json'}};
    if(body) opts.body=JSON.stringify(body);
    const r=await fetch(path,opts);
    const text=await r.text();
    try{return JSON.parse(text);}catch(e){return {};}
  }catch(err){console.error("API error:",err);return {};}
}

function el(id){return document.getElementById(id);}
function showNotif(msg,type='success',dur=4000){
  const icons={success:'✅',error:'❌',alarm:'🔔',info:'ℹ️'};
  const d=document.createElement('div');
  d.className=`notif ${type}`;
  d.innerHTML=`<span class="notif-icon">${icons[type]||'📢'}</span><span class="notif-text">${msg}</span>`;
  el('notif-container').appendChild(d);
  setTimeout(()=>{d.classList.add('out');setTimeout(()=>d.remove(),250);},dur);
}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';}
function nowTime(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}

function showInstallBanner(){
  if(!deferredInstallPrompt||el('install-banner')) return;
  const div=document.createElement('div');
  div.className='install-banner';div.id='install-banner';
  div.innerHTML=`
    <div style="font-size:2rem">📱</div>
    <div class="install-banner-text"><strong>Add MedCare to Home Screen</strong><p>Get quick access — works offline too!</p></div>
    <div style="display:flex;flex-direction:column;gap:.4rem;flex-shrink:0">
      <button class="btn btn-accent btn-sm" onclick="installApp()">Install</button>
      <button class="btn btn-ghost btn-sm" onclick="el('install-banner').remove()">Later</button>
    </div>`;
  document.body.appendChild(div);
}

async function installApp(){
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt=null;
  el('install-banner')?.remove();
}

function startAlarmCheck(){
  if(alarmInterval) clearInterval(alarmInterval);
  alarmInterval=setInterval(async()=>{
    if(!STATE.user) return;
    try{
      const rems=await api('/api/reminders');
      if(!Array.isArray(rems)) return;
      const now=new Date();
      const nowH=now.getHours(),nowM=now.getMinutes();
      rems.forEach(r=>{
        if(!r.time_str) return;
        const [h,m]=r.time_str.split(':').map(Number);
        if(h===nowH&&Math.abs(m-nowM)<1){
          const key=`alarm_${r.id}_${h}_${m}`;
          if(!STATE.reminderIntervals[key]){
            STATE.reminderIntervals[key]=true;
            showNotif(`⏰ Time to take ${r.name}!`,'alarm',10000);
            if('vibrate' in navigator) navigator.vibrate([400,200,400]);
          }
        }
      });
    }catch(e){}
  },30000);
}

// ═══════════════ RENDER ═══════════════
function render(){
  if(!STATE.user){renderAuth();return;}
  if(STATE.user.role==='hospital'){renderHospitalPortal();return;}
  renderUserApp();
}

// ═══════════════ AUTH ═══════════════
function renderAuth(tab='user',mode='login'){
  document.title='MedCare';
  el('app').innerHTML=`
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon-wrap">🩺</div>
        <h1>MEDCARE</h1>
        <p>Your Health Companion — Tumkur, Karnataka</p>
      </div>
      <div id="auth-inner"></div>
    </div>
  </div>`;
  renderAuthInner(tab,mode);
}

function renderAuthInner(tab,mode){
  const inner=el('auth-inner');if(!inner)return;
  const isHosp=tab==='hospital';
  inner.innerHTML=`
  <div class="role-tabs">
    <button class="role-tab ${!isHosp?'active':''}" onclick="renderAuthInner('user','${mode}')">👤 Patient</button>
    <button class="role-tab ${isHosp?'active':''}" onclick="renderAuthInner('hospital','${mode}')">🏥 Hospital</button>
  </div>
  ${mode==='login'?loginForm(isHosp):isHosp?hospitalSignupForm():userSignupForm()}
  <div class="alt-link">${mode==='login'?`No account? <span onclick="renderAuthInner('${tab}','signup')">Register here</span>`:`Have account? <span onclick="renderAuthInner('${tab}','login')">Sign In</span>`}</div>`;
}

function loginForm(isHosp){return `
  <div id="auth-err" class="err-msg"></div>
  <div class="form-row"><div class="fg"><label>Email</label><input id="l-email" type="email" placeholder="your@email.com"/></div></div>
  <div class="form-row"><div class="fg"><label>Password</label><input id="l-pass" type="password" placeholder="••••••••"/></div></div>
  <button class="submit-btn" onclick="doLogin('${isHosp?'hospital':'user'}')">Sign In →</button>`;}

function userSignupForm(){return `
  <div id="auth-err" class="err-msg"></div>
  <div class="form-row cols2"><div class="fg"><label>First Name</label><input id="s-fn" type="text" placeholder="Arun"/></div><div class="fg"><label>Last Name</label><input id="s-ln" type="text" placeholder="Kumar"/></div></div>
  <div class="form-row"><div class="fg"><label>Email</label><input id="s-email" type="email" placeholder="arun@email.com"/></div></div>
  <div class="form-row cols3"><div class="fg"><label>Age</label><input id="s-age" type="number" placeholder="28" min="1" max="120"/></div><div class="fg"><label>Gender</label><select id="s-gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select></div><div class="fg"><label>Phone</label><input id="s-phone" type="tel" placeholder="9876543210"/></div></div>
  <div class="form-row cols2"><div class="fg"><label>Password</label><input id="s-pass" type="password" placeholder="Min 6 chars"/></div><div class="fg"><label>Confirm</label><input id="s-cpass" type="password" placeholder="Repeat"/></div></div>
  <button class="submit-btn" onclick="doUserSignup()">Create Account →</button>`;}

function hospitalSignupForm(){return `
  <div id="auth-err" class="err-msg"></div>
  <div class="form-section"><div class="section-head">Hospital Details</div>
    <div class="form-row"><div class="fg"><label>Hospital Name *</label><input id="h-name" type="text" placeholder="City General Hospital"/></div></div>
    <div class="form-row cols2"><div class="fg"><label>Reg. Number *</label><input id="h-reg" type="text" placeholder="KA-H-2024-XXX"/></div><div class="fg"><label>Type</label><select id="h-type"><option>Government</option><option>Private</option><option>Trust</option><option>Teaching</option></select></div></div>
    <div class="form-row cols3"><div class="fg"><label>Beds</label><input id="h-beds" type="number" placeholder="200"/></div><div class="fg"><label>Est. Year</label><input id="h-est" type="number" placeholder="1985"/></div><div class="fg"><label>Phone *</label><input id="h-phone" type="tel" placeholder="0816-XXXXXXX"/></div></div>
  </div>
  <div class="form-section"><div class="section-head">Address</div>
    <div class="form-row"><div class="fg"><label>Full Address *</label><input id="h-addr" type="text" placeholder="B.H. Road, Near Bus Stand"/></div></div>
    <div class="form-row cols3"><div class="fg"><label>City</label><input id="h-city" type="text" value="Tumkur"/></div><div class="fg"><label>State</label><input id="h-state" type="text" value="Karnataka"/></div><div class="fg"><label>Pincode</label><input id="h-pin" type="text" placeholder="572101"/></div></div>
  </div>
  <div class="form-section"><div class="section-head">Services & Doctors</div>
    <div class="form-row"><div class="fg"><label>Services (comma separated)</label><input id="h-services" type="text" placeholder="Cardiology, Neurology, Pediatrics, ICU"/></div></div>
    <div id="doctors-list"></div>
    <button class="add-doctor-btn" onclick="addDoctorField()">+ Add Doctor</button>
  </div>
  <div class="form-section"><div class="section-head">Login Credentials</div>
    <div class="form-row cols2"><div class="fg"><label>Email *</label><input id="h-email" type="email" placeholder="hospital@email.com"/></div><div class="fg"><label>Password *</label><input id="h-pass" type="password" placeholder="Min 6 chars"/></div></div>
  </div>
  <button class="submit-btn" onclick="doHospitalSignup()">Register Hospital →</button>`;}

let docCount=0;
function addDoctorField(){
  docCount++;const id=docCount;
  const div=document.createElement('div');div.className='doctor-entry';div.id=`de-${id}`;
  div.innerHTML=`<button class="rem-doc" onclick="el('de-${id}').remove()">✕</button>
  <div class="form-row cols2" style="margin-bottom:.5rem"><div class="fg"><label>Doctor Name *</label><input id="dn-${id}" type="text" placeholder="Dr. Ravi Kumar"/></div><div class="fg"><label>Specialization *</label><input id="ds-${id}" type="text" placeholder="Cardiologist"/></div></div>
  <div class="form-row cols3"><div class="fg"><label>Experience (yrs)</label><input id="de-${id}" type="number" placeholder="10"/></div><div class="fg"><label>Fee (₹)</label><input id="df-${id}" type="number" placeholder="500"/></div><div class="fg"><label>Slots</label><input id="dsl-${id}" type="text" placeholder="09:00 AM, 02:00 PM"/></div></div>`;
  el('doctors-list').appendChild(div);
}

function gv(id){const e=el(id);return e?e.value.trim():'';}
function setErr(msg){const e=el('auth-err');if(e){e.textContent=msg;e.classList.toggle('show',!!msg);}}

async function doLogin(role){
  setErr('');
  const email=gv('l-email'),pass=gv('l-pass');
  if(!email||!pass){setErr('Please enter email and password.');return;}
  const btn=document.querySelector('.submit-btn');if(btn)btn.disabled=true;
  const res=await api('/api/login','POST',{email,password:pass});
  if(btn)btn.disabled=false;
  if(res.error){setErr(res.error);return;}
  if(res.user?.role!==role){setErr(`This is a ${res.user?.role} account. Please select the correct tab.`);return;}
  STATE.user=res.user;STATE.hospital=res.hospital||null;
  startAlarmCheck();render();
}

async function doUserSignup(){
  setErr('');
  const fn=gv('s-fn'),ln=gv('s-ln'),email=gv('s-email'),age=gv('s-age'),gender=gv('s-gender'),phone=gv('s-phone'),pass=gv('s-pass'),cpass=gv('s-cpass');
  if(!fn||!ln||!email||!age||!gender||!pass){setErr('Please fill all required fields.');return;}
  if(pass!==cpass){setErr('Passwords do not match.');return;}
  if(pass.length<6){setErr('Password must be at least 6 characters.');return;}
  const btn=document.querySelector('.submit-btn');if(btn)btn.disabled=true;
  const res=await api('/api/signup/user','POST',{name:`${fn} ${ln}`,email,password:pass,age:parseInt(age),gender,phone});
  if(btn)btn.disabled=false;
  if(res.error){setErr(res.error);return;}
  STATE.user=res.user;startAlarmCheck();
  showNotif(`Welcome to MedCare, ${fn}! 🎉`,'success');render();
}

async function doHospitalSignup(){
  setErr('');
  const name=gv('h-name'),reg=gv('h-reg'),phone=gv('h-phone'),addr=gv('h-addr'),email=gv('h-email'),pass=gv('h-pass');
  if(!name||!reg||!phone||!addr||!email||!pass){setErr('Please fill all required fields.');return;}
  const doctors=[];
  document.querySelectorAll('.doctor-entry').forEach(entry=>{
    const i=entry.id.split('-').pop();
    const dname=gv(`dn-${i}`),spec=gv(`ds-${i}`);
    if(dname&&spec){
      const slots=gv(`dsl-${i}`).split(',').map(s=>s.trim()).filter(Boolean);
      doctors.push({name:dname,specialty:spec,specialization:spec,experience:parseInt(gv(`de-${i}`)||0),fee:parseInt(gv(`df-${i}`)||0),slots:slots.length?slots:['10:00 AM','02:00 PM']});
    }
  });
  const btn=document.querySelector('.submit-btn');if(btn)btn.disabled=true;
  const res=await api('/api/signup/hospital','POST',{name,reg_number:reg,phone,address:addr,city:gv('h-city')||'Tumkur',state:gv('h-state')||'Karnataka',pincode:gv('h-pin'),email,password:pass,h_type:gv('h-type')||'Private',beds:parseInt(gv('h-beds')||100),established:parseInt(gv('h-est')||2000),services:gv('h-services'),doctors});

let selSlot={};
function selectSlot(hid,dname,dspec,slot,fee){
  document.querySelectorAll('.slot.sel').forEach(s=>s.classList.remove('sel'));
  if(event?.target) event.target.classList.add('sel');
  selSlot={hid,dname,dspec,slot,fee};
  const safeId=dname.replace(/\W+/g,'_');
  const bookEl=el(`book-${hid}-${safeId}`);
  if(bookEl) bookEl.innerHTML=`
  <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.6rem;padding:.65rem;background:rgba(79,142,247,0.06);border-radius:10px;border:1px solid var(--border)">
    <span style="font-size:.8rem;color:var(--text2)">📅 Select date:</span>
    <input type="date" id="book-date" style="padding:.35rem .65rem;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:.78rem" min="${new Date().toISOString().split('T')[0]}"/>
    <button class="btn btn-accent btn-sm" onclick="bookAppointment()">🗓️ Confirm Booking — ${slot}</button>
  </div>`;
}

async function bookAppointment(){
  const dateVal=el('book-date')?.value;
  if(!dateVal){showNotif('Please select a date','error');return;}
  const {hid,dname,dspec,slot,fee}=selSlot;
  if(!hid){showNotif('Select a time slot first','error');return;}
  const res=await api('/api/appointments','POST',{hospital_id:hid,doctor_name:dname,doctor_spec:dspec,slot_date:dateVal,slot_time:slot,fee:parseInt(fee||0)});
  if(res.error){showNotif(res.error,'error');return;}
  showNotif(`✅ Appointment booked with ${dname} on ${fmtDate(dateVal)} at ${slot}!`,'success',7000);
  selSlot={};STATE.hospitalDetail=null;goTo('appointments');
}

function quickChat(msg){const inp=el('chat-inp');if(inp)inp.value=msg;sendChat();}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}

async function sendChat(){
  const inp=el('chat-inp'),btn=el('chat-send-btn'),msgs=el('chat-msgs');
  if(!inp||!msgs) return;
  const text=inp.value.trim();if(!text) return;
  inp.value='';btn.disabled=true;
  const t=nowTime();
  msgs.innerHTML+=`<div class="msg user"><div class="msg-bubble">${text.replace(/</g,'&lt;')}</div><div class="msg-time">${t}</div></div>`;
  const typId='typ-'+Date.now();
  msgs.innerHTML+=`<div class="msg bot" id="${typId}"><div class="msg-bot-av">🤖</div><div class="typing-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  STATE.chatHistory.push({role:'user',content:text});
  const res=await api('/api/ai/chat','POST',{messages:STATE.chatHistory});
  const reply=res.reply||'I had trouble responding. Please try again.';
  STATE.chatHistory.push({role:'assistant',content:reply});
  el(typId)?.remove();
  msgs.innerHTML+=`<div class="msg bot"><div class="msg-bot-av">🤖</div><div><div class="msg-bubble">${reply.replace(/</g,'&lt;').replace(/\n/g,'<br/>')}</div><div class="msg-time">${nowTime()}</div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  btn.disabled=false;
  // If appointment was booked, refresh appointments badge
  if(reply.includes('Appointment requested successfully')) {
    setTimeout(()=>showNotif('Appointment booked! Check Appointments tab 📅','info',5000),500);
  }
}

    ${appts.length===0?`<div class="empty-state" style="padding:2rem"><span class="empty-icon">📭</span><p>No appointments yet</p></div>`:
    `<div style="overflow-x:auto"><table class="appts-table">
      <thead><tr><th>Patient</th><th>Doctor</th><th>Date & Time</th><th>Fee</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        ${appts.slice(0,15).map(a=>`<tr>
          <td style="font-weight:600">${a.user_name}</td>
          <td><div style="font-weight:500">${a.doctor_name}</div><div style="font-size:.7rem;color:var(--text3)">${a.doctor_spec||''}</div></td>
          <td><div>${fmtDate(a.slot_date)}</div><div style="font-size:.72rem;color:var(--text3)">${a.slot_time}</div></td>
          <td>₹${a.fee||0}</td>
          <td><span class="badge ${a.status==='pending'?'b-amber':a.status==='accepted'?'b-green':a.status==='rejected'?'b-red':'b-purple'}">${a.status}</span></td>
          <td>${a.status==='pending'?`<div style="display:flex;gap:.3rem"><button class="btn btn-success btn-sm" onclick="hUpdateAppt(${a.id},'accepted')">✅</button><button class="btn btn-danger btn-sm" onclick="hUpdateAppt(${a.id},'rejected')">❌</button></div>`:
          a.status==='accepted'?`<button class="btn btn-danger btn-sm" onclick="hUpdateAppt(${a.id},'rejected')">Cancel</button>`:'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`}
  </div>`;
}

async function renderHAppts(pc){
  let appts=[];
  try{const r=await api('/api/appointments/hospital');if(Array.isArray(r))appts=r;}catch(e){}
  pc.innerHTML=`
  <div class="page-head"><h1>Manage Appointments</h1><p>Accept or reject patient bookings</p></div>
  ${appts.length===0?`<div class="empty-state"><span class="empty-icon">📭</span><h3>No Appointments Yet</h3><p>Patient bookings will appear here</p></div>`:
  appts.map((a,i)=>`
  <div class="appt-card" style="animation-delay:${i*0.05}s">
    <div class="appt-top">
      <div><div class="appt-doctor">${a.user_name}</div><div class="appt-spec">Dr: ${a.doctor_name}${a.doctor_spec?' — '+a.doctor_spec:''}</div></div>
      <span class="badge ${a.status==='pending'?'b-amber':a.status==='accepted'?'b-green':a.status==='rejected'?'b-red':'b-purple'}">${a.status}</span>
    </div>
    <div class="appt-grid">
      <div><div class="appt-field">Date</div><div class="appt-val">${fmtDate(a.slot_date)}</div></div>
      <div><div class="appt-field">Time</div><div class="appt-val">${a.slot_time}</div></div>
      <div><div class="appt-field">Fee</div><div class="appt-val">₹${a.fee||0}</div></div>
    </div>
    ${a.status==='pending'?`<div class="appt-actions">
      <button class="btn btn-success" onclick="hUpdateAppt(${a.id},'accepted')">✅ Accept</button>
      <button class="btn btn-danger" onclick="hUpdateAppt(${a.id},'rejected')">❌ Reject</button>
    </div>`:a.status==='accepted'?`<div class="appt-actions"><button class="btn btn-danger btn-sm" onclick="hUpdateAppt(${a.id},'rejected')">Cancel</button></div>`:''}
  </div>`).join('')}`;
}

async function hUpdateAppt(id,status){
  await api(`/api/appointments/${id}/status`,'PUT',{status});
  showNotif(`Appointment ${status}! ${status==='accepted'?'✅':'❌'}`,'success');
  hRenderPage(STATE.page);
}

async function renderHProfile(pc){
  const h=STATE.hospital||{};
  const doctors=h.doctors||[];
  pc.innerHTML=`
  <div class="page-head"><h1>Hospital Profile</h1></div>
  <div class="card" style="margin-bottom:1.25rem">
    <div class="sec-title">Basic Info</div>
    <div class="g2">
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Hospital Name</div><div style="font-weight:700">${h.name||'—'}</div></div>
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Reg. Number</div><div style="font-weight:700">${h.reg_number||'—'}</div></div>
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Address</div><div style="font-weight:700">${h.address?h.address+', ':''} ${h.city||''}, ${h.state||''} ${h.pincode||''}</div></div>
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Type / Beds</div><div style="font-weight:700">${h.h_type||'—'} • ${h.beds||'?'} beds</div></div>
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Phone</div><div style="font-weight:700">${h.phone||'—'}</div></div>
      <div><div style="font-size:.7rem;color:var(--text2);margin-bottom:.2rem">Established</div><div style="font-weight:700">${h.established||'—'}</div></div>
    </div>
    ${h.description?`<div style="margin-top:1rem;padding:.875rem;background:var(--bg3);border-radius:10px;font-size:.83rem;color:var(--text2);line-height:1.7">${h.description}</div>`:''}
  </div>
  ${h.services?.length?`<div class="card" style="margin-bottom:1.25rem"><div class="sec-title">Services</div><div class="hosp-services">${h.services.map(s=>`<span class="svc-tag">${s}</span>`).join('')}</div></div>`:''}
  <div class="card">
    <div class="sec-title">Doctors (${doctors.length})</div>
    ${doctors.length===0?`<p style="color:var(--text3);font-size:.83rem">No doctors added yet.</p>`:
    doctors.map(d=>`<div class="doc-card" style="margin-bottom:.65rem">
      <div class="doc-av">${(d.name||'D').split(' ').filter(Boolean).pop()?.[0]||'D'}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-spec">${d.specialty||d.specialization||''}</div>
        <div class="doc-meta">${d.experience||0} yrs • ₹${d.fee||0}</div>
        <div class="slots-wrap">${(d.slots||[]).map(s=>`<span class="slot">${s}</span>`).join('')}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ═══════════════ MODAL ═══════════════
function showModal(title,body){
  const div=document.createElement('div');
  div.className='modal-overlay';div.id='modal-overlay';
  div.innerHTML=`<div class="modal-box"><div class="modal-head"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button></div>${body}</div>`;
  div.onclick=e=>{if(e.target===div)closeModal();};
  document.body.appendChild(div);
}
function closeModal(){el('modal-overlay')?.remove();}

// ═══════════════ INIT ═══════════════
async function init(){
  try{
    const res=await api('/api/me');
    if(res.user){STATE.user=res.user;STATE.hospital=res.hospital||null;startAlarmCheck();}
  }catch(e){}
  render();
}

// Register service worker for PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/static/sw.js').catch(()=>{});
}

init();
</script>
</body>
</html>
