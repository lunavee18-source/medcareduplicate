<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MedCare</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MedCare" />
  <meta name="description" content="Your personal health companion — appointments, reminders, AI health chat." />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #0ea5e9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    }
    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(37,99,235,0.3);
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 32px; font-weight: 800; color: #1e40af; letter-spacing: -0.5px; }
    p  { margin-top: 8px; color: #64748b; font-size: 15px; line-height: 1.5; }
    .status {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      color: #16a34a;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 999px;
    }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .install-hint {
      margin-top: 28px;
      background: #eff6ff;
      border-radius: 12px;
      padding: 16px;
      font-size: 13px;
      color: #1e40af;
      line-height: 1.6;
    }
    .install-hint strong { display: block; margin-bottom: 4px; font-size: 14px; }
    .btn {
      display: block;
      margin-top: 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    #install-btn { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/icons/icon-512.png" alt="MedCare Logo" />
    </div>
    <h1>MedCare</h1>
    <p>Your personal health companion — book appointments, set reminders, and chat with AI health guidance.</p>

    <div class="status">
      <span class="dot"></span>
      Backend is Live
    </div>

    <div class="install-hint" id="ios-hint" style="display:none">
      <strong>📱 Add to Home Screen (iOS)</strong>
      Tap the <b>Share</b> button in Safari, then choose <b>"Add to Home Screen"</b> to install MedCare as an app.
    </div>

    <button class="btn" id="install-btn">📲 Install MedCare App</button>

    <a class="btn" href="/api/hospitals" style="margin-top:12px; background:#0ea5e9;">
      View API →
    </a>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(() => {
        console.log('SW registered');
      }).catch(console.error);
    }

    // iOS install hint
    const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isInStandalone = window.navigator.standalone;
    if (isIOS && !isInStandalone) {
      document.getElementById('ios-hint').style.display = 'block';
    }

    // Android / Chrome install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-btn').style.display = 'block';
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('Install outcome:', outcome);
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    });
  </script>
</body>
</html>
